name: Deploy via FTP

on:
  push:
    branches:
      - main # Ubah ke branch utama Anda jika berbeda (misal: master)

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4
        
      - name: 🛠️ Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2' # Ubah jika versi PHP server Anda berbeda (misal 8.1 atau 8.3)
          
      - name: 📦 Install Composer Dependencies
        run: composer install --no-dev --optimize-autoloader
      
      - name: 📂 Sync Main Files to mindmatch_mesin
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /mindmatch_mesin/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            public/**
            .github/**
            
      - name: 📂 Sync Public Files to public_html/mindmatch
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./public/
          server-dir: /public_html/mindmatch/
